<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>

    <!-- Center tower gradient (blue) -->
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Side wing gradient (slightly darker blue) -->
    <linearGradient id="wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <!-- Top accent bar gradient -->
    <linearGradient id="topbar" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Window glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- ── Top accent bar ── -->
  <rect x="0" y="0" width="64" height="3" rx="1.5" fill="url(#topbar)"/>

  <!-- ── Ground line ── -->
  <rect x="5" y="57" width="54" height="1.5" rx="0.75" fill="#3b82f6" opacity="0.3"/>

  <!-- ═══ LEFT WING ═══ -->
  <rect x="7" y="31" width="13" height="26" rx="1.5" fill="url(#wing)"/>

  <!-- Left wing windows (2 col × 3 row) -->
  <!-- row 1 -->
  <rect x="9.5"  y="34" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.80" filter="url(#glow)"/>
  <rect x="14.5" y="34" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.55"/>
  <!-- row 2 -->
  <rect x="9.5"  y="40" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.60"/>
  <rect x="14.5" y="40" width="3.5" height="3.5" rx="0.7" fill="#10b981" opacity="0.80" filter="url(#glow)"/>
  <!-- row 3 -->
  <rect x="9.5"  y="46" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.75"/>
  <rect x="14.5" y="46" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.50"/>

  <!-- ═══ RIGHT WING ═══ -->
  <rect x="44" y="31" width="13" height="26" rx="1.5" fill="url(#wing)"/>

  <!-- Right wing windows -->
  <!-- row 1 -->
  <rect x="46"  y="34" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.55"/>
  <rect x="51"  y="34" width="3.5" height="3.5" rx="0.7" fill="#10b981" opacity="0.80" filter="url(#glow)"/>
  <!-- row 2 -->
  <rect x="46"  y="40" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.80" filter="url(#glow)"/>
  <rect x="51"  y="40" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.60"/>
  <!-- row 3 -->
  <rect x="46"  y="46" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.50"/>
  <rect x="51"  y="46" width="3.5" height="3.5" rx="0.7" fill="white" opacity="0.75"/>

  <!-- ═══ CENTER TOWER (tallest) ═══ -->
  <rect x="21" y="12" width="22" height="45" rx="2" fill="url(#tower)"/>

  <!-- Tower top detail (penthouse line) -->
  <rect x="21" y="12" width="22" height="4" rx="2" fill="#60a5fa" opacity="0.4"/>

  <!-- Center tower windows (2 col × 4 row) -->
  <!-- row 1 -->
  <rect x="24"  y="17" width="6" height="5.5" rx="1" fill="white" opacity="0.85" filter="url(#glow)"/>
  <rect x="33"  y="17" width="6" height="5.5" rx="1" fill="#10b981" opacity="0.90" filter="url(#glow)"/>
  <!-- row 2 -->
  <rect x="24"  y="26" width="6" height="5.5" rx="1" fill="white" opacity="0.70"/>
  <rect x="33"  y="26" width="6" height="5.5" rx="1" fill="white" opacity="0.85" filter="url(#glow)"/>
  <!-- row 3 -->
  <rect x="24"  y="35" width="6" height="5.5" rx="1" fill="#10b981" opacity="0.80" filter="url(#glow)"/>
  <rect x="33"  y="35" width="6" height="5.5" rx="1" fill="white" opacity="0.65"/>
  <!-- row 4 -->
  <rect x="24"  y="44" width="6" height="4" rx="1" fill="white" opacity="0.80"/>
  <rect x="33"  y="44" width="6" height="4" rx="1" fill="white" opacity="0.55"/>

  <!-- ── Centre Door ── -->
  <rect x="27.5" y="50" width="9" height="7" rx="1.2" fill="#1e3a8a"/>
  <!-- door handle -->
  <circle cx="35" cy="54" r="0.9" fill="#93c5fd" opacity="0.7"/>
  <!-- door centre line -->
  <rect x="31.5" y="51" width="1" height="5" rx="0.5" fill="#93c5fd" opacity="0.25"/>
</svg>
